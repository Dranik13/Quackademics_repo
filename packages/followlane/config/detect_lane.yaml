line_detection_params:
  # maximale lücke zwischen Mittel- und Seitenlinie
  max_line_gap: 150
  # alle Pixel deren y-Wert unter diesem Wert liegt werden nicht betrachtet (Parameter funktioniert irgendwie nicht richtig -> im Code erste Zeile in cvFindlane())
  look_distance: 60
  # Bildbreite um Bildmitte in der nach der Mittellinie gesucht wird
  middle_line_look_width: 300
  # Wenn vom Mittellinienpunkt aus kein weißes Pixel gefunden wurde, wird in dieser definierten distanz ein Orientierungspunkt gesetzt
  def_dist_middle_line: 60
  # Anz. an Mittelliniensegmenten die betrachtet werden 
  num_middle_pts: 7
  # Orientierungspunkt der an die Regelung gesendet wird. Gezählt vom am Fz. nächsten 
  control_pt_nr: 3
search_for_parking_lot:
  look_for_parkinglot: true
  search_range: 50
  min_nr_line_segments: 3
  max_y_diff: 70
debugging_output:
  line_coordinates: false
  input_image: false
  output_image: true
  mask_white: false
  mask_yellow: false
controller:
  max_speed: 0.2
  min_speed_percent: 0.4
  max_steering_angle: 5